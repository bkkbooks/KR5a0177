front:
  text: 玄風慶會録序致十一國師長春真人昔承宣召不得已而後起遂别中土過流沙陳道德以致君止干戈而救物功成身退厭世登天自太上玄元西去之後寥寥千百載唯真人一人而已其往回事迹載於西遊記中詳矣唯餘對上傳道玄言奧旨上令近侍録而祕之歲乃踰旬傳之及外將以刊行於世願與天下共知玄風慶會一段竒事云壬辰長至日序玄風慶會録
  hash: sha256:211af5ad13addb79e22cb37d73a282a092be924a4de73e8b300ca3355202bcea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0177_HFL_000-001a, image: hfl/0076/0076-188.png}
body:
  text: 元侍臣昭武大將軍尚書禮部侍郎移剌楚才奉勑編録欽奉皇帝聖議宣請高道長春真人歲在己卯正元後一日敕朝官劉仲祿齎詔尋訪直至東萊適符聖意禮迎仙馭不辭遠遠而來逮乎壬午之冬十月既望皇帝畋于西域雪山之陽是夕御行在設庭燎虛前席延長春真人以問長生之道真人曰夫道生天育地日月星辰鬼神人物皆從道生人止知天大不知道之大也余生平棄親出家唯學此耳道生天地開闢而生人焉人之始生也神光自照行步如飛地生菌自有滋味不假炊爨人皆食之此時尚未火食其菌皆香且鼻嗅其香口嗜其味漸致身重神光尋滅以愛欲之深故也學道之人以此之故世人愛處不愛世人住處不住去聲色以清靜為娛屏滋味以恬淡為美但有執著不明道德也眼見乎色耳聽乎聲口嗜乎味性逐乎情則散其氣譬如氣鞠氣實則健氣散則否人以氣為主逐物動念則元氣散若氣鞠之氣散耳天生二物曰動植草木之類為植植而無識兩露霑濡因得生榮人物之屬為動動而有情無衣無食何以卒歲必當經營耳旦夕云為身口為纍故也夫男陽也屬火女陰也屬水唯陰能消陽水能剋火故學道之人首戒乎色夫經營衣食則勞乎思慮雖散其氣而散少貪婪色欲則耗乎精神亦散其氣而散之多道産二儀輕清者為天天陽也屬火重燭者為地地陰也屬水人居其中負陰而抱陽故學道之人知修鍊之術去奢屏欲固精守神唯鍊乎陽是致陰消而陽全則升乎天而為仙如火之炎上也其愚迷之徒以酒為漿以妄為常恣其情逐其欲耗其精損其神是致陽衰而陰盛則沉於地為鬼如水之流下也夫學修真者如轉石上乎高山愈高愈難跬步顛沛前功俱廢以其難為也舉世莫之為也背道逐欲者如擲石下乎峻坡愈卑而愈易斯須隕墜一去無回以其易為也故舉世從之莫或悟也余前所謂修鍊之道皆常人之事耳天子之説又異於是陛下本天人耳皇天眷命假手我家除殘去暴為元元父母恭行天罰如代大匠斫克艱克難功成限畢即升天復位在世之間切宜減聲色省耆欲得聖體康寧睿算遐遠耳庶人一妻尚且損身況乎天子多畜嬪御寧不深損陛下宫姬滿座前聞劉仲祿中都等揀選處女以備後宫竊聞道經云不見可欲使心不亂既見之戒之則難願留意焉人認身為己此乃假物從父母而得之者神為真己從道中而得之者能思慮寤寐者是也行善進道則升天為之仙作惡背道則入地為之鬼夫道産衆生如金為衆器銷其像則返成乎金人行乎善則返乎道人間聲色衣食人見以為娛樂此非真樂本為苦耳世人以妄為真以苦為樂不亦悲哉殊不知上天至樂乃真樂耳余儕以學道之故棄父母而棲巖穴同時學道四人曰丘曰劉曰談曰馬彼三人功滿道成今已升化余辛苦之限未終日一食一味一盂恬然自適以待乎時其富者貴者濟民拯世積行纍功更為異耳但能積善行道胡患不能為仙乎中國承平日久上天屢降經教勸人為善大河之北西川江左悉有之東漢時于吉受太平經一百五十卷皆修真治國之方中國道人誦之行之可獲福成道又恆帝永壽元年正月七日太上降蜀臨卭授天師張道陵南斗北斗經及二十四階法籙諸經籍千餘卷晉王纂遇太上道君法駕乘空賜經數十卷元魏時天師寇謙之居嵩山於太上等處受道經六十餘卷皆治心修道祈福禳災掃除魑魅拯疾疫之術其餘經教不可盡言降經之意欲使古今帝王臣民皆令行善經旨太多請舉其要天地之生人為貴是故人身難得如麟之角萬物紛然如牛之毛既獲難得之身宜趣修真之路作善修福漸臻妙道上至帝王降及民庶尊卑雖異性命各同耳帝王悉天人謫降人間若行善修福則升天之時位踰前職不行善修福則反是天人有功微行薄者再令下世修福濟民方得高位昔軒轅氏天命降世一世為民再世為臣三世為君濟世安民纍功積德數盡升天而位尊於昔陛下修行之法無他當外修陰德內固精神耳恤民保衆使天下懷安則為外行省欲保神為乎內行人以飲食為本其清者為之精氣濁者為之便溺貪欲好色則喪精耗氣乃成衰憊陛下宜加珍嗇一宵一為已為深損而況恣欲者乎雖不能全戒但能節欲則幾於道矣夫神為子氣為母氣經目為泪經鼻為經舌為津經外為汗經內為血經骨為髓經腎為精氣全則生氣亡則死氣盛則壯氣衰則老常使氣不散則如子之有母氣散則如子喪父母何恃何怙夫神氣同體精髓一源陛下試一月靜寢必覺精神清爽筋骨強健古人云服藥千朝不如獨卧一宵藥為草精為髓去髓添草有何益哉譬如囊中貯之金旋去金而添鐵久之金盡囊雖滿空遺鐵耳服藥之理夫何異乎古人以繼嗣之故娶婦而立家先聖周公孔子孟子各有子孔子四十而不惑孟子四十不動心人生四十己上氣血已衰故戒之在色也陛下聖子神孫枝蔓多廣宜保養戒欲為自計耳昔宋上皇本天人也有神仙林靈素者挈之神遊上天入所居宫題其額曰神霄不飢不渴不寒不暑逍遙無事快樂自在欲久居之無復往人間之意林靈素勸之曰陛下天命人世有天子功限未畢豈得居此遂下人間自後女真國興太祖皇帝之將婁失虜上皇北歸久而老終于上京由是知上天之樂何啻萬倍人間又知因緣未終豈能遽然而歸也余昔年出家同道四人彼三子先已升化如蟬蛻然委此凡骨而去能化身千百無不可者余辛苦萬端未能去世亦因緣之故也夫人之未生在乎道中不寒不暑不飢不渴心無所思真為快樂既生而受形眼觀乎色耳聽乎聲舌了乎味意慮乎事萬事生矣古人以心意莫能禦也故喻心為猿意為馬其難制可知也古人有言曰易伏猛獸難降寸心乃成道升天之捷徑耳道人修真鍊心一物不思量如太虛止水水之風息也靜而清萬物照之燦然悉見水之風來也動而濁曷能鑑萬物哉本來真性靜如止水眼見乎色耳悅乎聲舌嗜乎味意著乎事此數者續續而疊舉若飄風之鼓浪也道人治心之初甚難歲久功深損之又損至於無為道人一身耳治心猶難矧夫天子富有四海日攬萬機治心豈易哉但能節色欲減思慮亦獲天祐况全戒者邪昔軒轅皇帝造弧矢創兵革以威天下功成之際請教于仙人廣成子以問治身之道廣成子曰汝無使思慮營營一言足矣余謂修身之道貴乎中和太怒則傷乎身太喜則傷乎神太思慮則傷乎氣此三者於道甚損宜戒之也陛下既知神為真己身是幻軀凡見色起心當自思身假神真自能止念也人生壽命難得且如鳥獸歲歲産子旋踵夭亡壯老者鮮嬰童亦如之是故二十三十為之下壽四十五十為之中壽六十七十為之上壽陛下春秋已入上壽之期宜修德保身以介眉壽出家學道人惡衣惡食不積財恐害身損福故也在家修道之人飮食居處珍玩貨財亦當依分不宜過差也四海之外普天之下所有國土不啻億兆奇珍異寶比比出之皆不如中原天垂經教治國治身之術為之大備屢有奇人成道升天耳山東河北天下美地多出禾良美蔬魚盬絲繭以給四方之用自古得之者為大國所以歷代有國家者唯爭此地耳今己為民有兵火相繼流散未集宜差知彼中子細事務者能幹官規措勾當與免三年稅賦使軍國足絲帛之用黔黎獲蘇息之安一舉而兩得之兹亦安民祈福之一端耳自天祐之吉無不利也余萬里之外一召不遠而來修身養命之方既已先言治國保民之術何為惜口余前所謂安集山東河北之事如差清幹官前去依上措畫必當天心苟授以非才不徒無益反為害也初金國之得天下以創起東土中原人情尚未諳悉封劉豫於東平經略八年然後取之此亦開創良策也願加意焉修身養命要妙之道傳之盡矣其治國保民之術微陳梗槩其用之捨之在宸衷之斷耳昔金國世宗皇帝即位之十年色欲過節不勝衰憊每朝會二人掖行之自是博訪高道求保養之方亦嘗請余問修真之道余如前説自後身體康強行步如故凡在位三十年升遐余生平學道心以無思無慮夢中天意若曰功行未滿當待時升化耳幻身假物若逆旅蛻居耳何足戀也真身飛升可化千百無施不可上天千歲或萬萬遇有事奉天命降世投胎就舍而已傳道畢上諭之曰諄諄道誨敬聞命矣斯皆難行之事然則敢不遵依仙命勤而行之傳道之語已命近臣録之簡册朕將親覽其有玄旨未明者繼當請益焉玄風慶會録終
