front:
  text: 玄風慶會録序致十一國師長春眞人昔承宣召不得已而後起遂别中土過流沙陳道德以致君止干戈而救物功成身退厭世登天自太上玄元西去之後寥寥千百載唯眞人一人而已其往回事跡載於西遊記中詳矣唯餘對上傳道玄言奥㫖上令近侍録而秘之歲乃踰旬傳之及外將以刊行於世願與天下共知玄風慶會一段竒事云壬辰長至日序玄風慶會録
  hash: sha256:f9864cc838cc425b56eb9845ab4c843ab4d9d4218b966d255765761e641a813a
  markers:
