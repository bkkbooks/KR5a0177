body:
  text: 元侍臣昭武大將軍尚書禮部侍郎移剌楚才奉勑編録欽奉皇帝聖議宣請高道長春眞人歲在己卯正元後一日敕朝官劉仲禄齎詔尋訪直至東萊適符聖意禮迎仙馭不辭遠遠而來逮乎壬午之冬十月既望皇帝畋于西域雪山之陽是夕御行在設庭燎虚前席延長春眞人以問長生之道眞人曰夫道生天育地日月星辰鬼神人物皆從道生人止知天大不知道之大也余生平棄親出家唯學此耳道生天地開闢而生人焉人之始生也神光自照行步如飛地生菌自有滋味不假炊爨人皆食之此時尚未火食其菌皆香且鼻嗅其香口嗜其味漸致身重神光尋滅以愛欲之深故也學道之人以此之故世人愛處不愛世人住處不住去聲色以清靜爲娱屏滋味以恬淡爲美但有執著不明道德也眼見乎色耳聽乎聲口嗜乎味性逐乎情則散其氣譬如氣鞠氣實則徤氣散則否人以氣爲主逐物動念則元氣散若氣鞠之氣散耳天生二物曰動植草木之類爲植植而無識兩露霑濡因得生榮人物之屬爲動動而有情無衣無食何以卒歲必當經營耳旦夕云爲身口爲累故也夫男陽也屬火女陰也屬水唯陰能消陽水能剋火故學道之人首戒乎色夫經營衣食則勞乎思慮雖散其氣而散少貪婪色欲則耗乎精神亦散其氣而散之多道產二儀輕清者爲天天陽也屬火重燭者爲地地陰也屬水人居其中負陰而抱陽故學道之人知修鍊之術去奢屏欲固精守神唯鍊乎陽是致陰消而陽全則昇乎天而爲仙如火之炎上也其愚迷之徒以酒爲漿以妄爲常恣其情逐其欲耗其精損其神是致陽衰而陰盛則沉於地爲鬼如水之流下也夫學修眞者如轉石上乎高山愈高愈難跬步顛沛前功俱廢以其難爲也舉世莫之爲也背道逐欲者如擲石下乎峻坡愈卑而愈易斯須隕墜一去無迴以其易爲也故舉世從之莫或悟也余前所謂修鍊之道皆常人之事耳天子之説又異於是陛下本天人耳皇天眷命假手我家除殘去暴爲元元父母恭行天罰如代大匠斲克艱克難功成限畢即昇天復位在世之間切宜减聲色省耆慾得聖體康寧睿筭遐遠耳庶人一妻尚且損身況乎天子多畜嬪御寧不深損陛下宫姬滿座前聞劉仲禄中都等揀選處女以備後宫竊聞道經云不見可欲使心不亂既見之戒之則難願留意焉人認身爲己此乃假物從父母而得之者神爲眞己從道中而得之者能思慮寤寐者是也行善進道則昇天爲之仙作惡背道則入地爲之鬼夫道產衆生如金爲衆器銷其像則返成乎金人行乎善則返乎道人間聲色衣食人見以爲娱樂此非眞樂本爲苦耳世人以妄爲眞以苦爲樂不亦悲哉殊不知上天至樂乃眞樂耳余儕以學道之故棄父母而棲巖穴同時學道四人曰丘曰劉曰譚曰馬彼三人功滿道成今已昇化余辛苦之限未終日一食一味一盂恬然自適以待乎時其富者貴者濟民拯世積行累功更爲異耳但能積善行道胡患不能爲仙乎中國承平日久上天屢降經教勸人爲善大河之北西川江左悉有之東漢時于吉受太平經一百五十卷皆修眞治國之方中國道人誦之行之可獲福成道又恒帝永壽元年正月七日太上降蜀臨卭授天師張道陵南斗北斗經及二十四階法籙諸經籍千餘卷晋王纂遇太上道君法駕乘空賜經數十卷元魏時天師寇謙之居嵩山於太上等處受道經六十餘卷皆治心修道祈福禳灾掃除魑魅拯疾疫之術其餘經教不可盡言降經之意欲使古今帝王臣民皆令行善經㫖太多請舉其要天地之生人爲貴是故人身難得如麟之角萬物紛然如牛之毛既獲難得之身宜趣修眞之路作善修福漸臻妙道上至帝王降及民庶尊卑雖異性命各同耳帝王悉天人謫降人間若行善修福則昇天之時位踰前職不行善修福則反是天人有功微行薄者再令下世修福濟民方得高位昔軒轅氏天命降世一世爲民再世爲臣三世爲君濟世安民累功積德數盡昇天而位尊於昔陛下修行之法無他當外修陰德内固精神耳恤民保衆使天下懷安則爲外行省欲保神爲乎内行人以飲食爲本其清者爲之精氣濁者爲之便溺貪慾好色則喪精耗氣乃成衰憊陛下宜加珍嗇一宵一爲已爲深損而況恣慾者乎雖不能全戒但能節慾則幾於道矣夫神爲子氣爲母氣經目爲泪經鼻爲經舌爲津經外爲汗經内爲血經骨爲髓經腎爲精氣全則生氣亡則死氣盛則壯氣衰則老常使氣不散則如子之有母氣散則如子喪父母何恃何怙夫神氣同體精髓一源陛下試一月靜寢必覺精神清爽筋骨强健古人云服藥千朝不如獨卧一宵藥爲草精爲髓去髓添草有何益哉譬如囊中貯之金旋去金而添鐵久之金盡囊雖滿空遺鐵耳服藥之理夫何異乎古人以繼嗣之故娶婦而立家先聖周公孔子孟子各有子孔子四十而不惑孟子四十不動心人生四十己上氣血已衰故戒之在色也陛下聖子神孫枝蔓多廣宜保養戒欲爲自計耳昔宋上皇本天人也有神仙林靈素者挈之神游上天入所居宫題其額曰神霄不飢不渴不寒不暑逍遥無事快樂自在欲久居之無復往人間之意林靈素勸之曰陛下天命人世有天子功限未畢豈得居此遂下人間自後女眞國興太祖皇帝之將婁失虜上皇北歸久而老終于上京由是知上天之樂何啻萬倍人間又知因縁未終豈能遽然而歸也余昔年出家同道四人彼三子先已昇化如蟬蜕然委此凡骨而去能化身千百無不可者余辛苦萬端未能去世亦因縁之故也夫人之未生在乎道中不寒不暑不飢不渴心無所思眞爲快樂既生而受形眼觀乎色耳聽乎聲舌了乎味意慮乎事萬事生矣古人以心意莫能禦也故喻心爲猿意爲馬其難制可知也古人有言曰易伏猛獸難降寸心乃成道昇天之捷徑耳道人修眞鍊心一物不思量如太虚止水水之風息也靜而清萬物照之燦然悉見水之風來也動而濁曷能鑑萬物哉本來眞性靜如止水眼見乎色耳悦乎聲舌嗜乎味意著乎事此數者續續而疊舉若飄風之鼓浪也道人治心之初甚難歲久功深損之又損至於無爲道人一身耳治心猶難矧夫天子富有四海日攬萬機治心豈易哉但能節色欲减思慮亦獲天祐况全戒者邪昔軒轅皇帝造弧矢創兵革以威天下功成之際請教于仙人廣成子以問治身之道廣成子曰汝無使思慮營營一言足矣余謂修身之道貴乎中和太怒則傷乎身太喜則傷乎神太思慮則傷乎氣此三者於道甚損宜戒之也陛下既知神爲眞己身是幻軀凡見色起心當自思身假神眞自能止念也人生壽命難得且如鳥獸歲歲產子旋踵夭亡壯老者鮮嬰童亦如之是故二十三十爲之下壽四十五十爲之中壽六十七十爲之上壽陛下春秋已入上壽之期宜修德保身以介眉壽出家學道人惡衣惡食不積財恐害身損福故也在家修道之人飮食居處珍玩貨財亦當依分不宜過差也四海之外普天之下所有國土不啻億兆奇珍異寳比比出之皆不如中原天垂經教治國治身之術爲之大備屢有奇人成道昇天耳山東河北天下美地多出禾良美蔬魚盬絲蠒以給四方之用自古得之者爲大國所以歷代有國家者唯争此地耳今己爲民有兵火相繼流散未集宜差知彼中子細事務者能幹官規措勾當與免三年税賦使軍國足絲帛之用黔黎獲蘇息之安一舉而兩得之兹亦安民祈福之一端耳自天祐之吉無不利也余萬里之外一召不遠而來修身養命之方既已先言治國保民之術何爲惜口余前所謂安集山東河北之事如差清幹官前去依上措畫必當天心苟授以非才不徒無益反爲害也初金國之得天下以創起東土中原人情尚未諳悉封劉豫於東平經略八年然後取之此亦開創良策也願加意焉修身養命要妙之道傳之盡矣其治國保民之術微陳梗槩其用之捨之在宸衷之斷耳昔金國世宗皇帝即位之十年色欲過節不勝衰憊每朝會二人掖行之自是博訪高道求保養之方亦嘗請余問修眞之道余如前説自後身體康强行步如故凡在位三十年昇遐余生平學道心以無思無慮夢中天意若曰功行未滿當待時昇化耳幻身假物若逆旅蜕居耳何足戀也眞身飛昇可化千百無施不可上天千歲或萬萬遇有事奉天命降世投胎就舍而已傳道畢上諭之曰諄諄道誨敬聞命矣斯皆難行之事然則敢不遵依仙命勤而行之傳道之語已命近臣録之簡册朕將親覽其有玄㫖未明者繼當請益焉玄風慶會録終
